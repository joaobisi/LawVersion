name: .NET CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test (.NET 8)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore LawVersion.sln

    - name: Build Solution
      run: dotnet build LawVersion.sln --no-restore --configuration Release

    - name: Run Unit Tests
      run: dotnet test LawVersion.sln --no-build --configuration Release --verbosity normal
